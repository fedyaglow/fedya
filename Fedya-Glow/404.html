<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Non Trouvée | Fedya Glow</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #000000 0%, #333 100%);
            color: white;
            text-align: center;
            padding: 2rem;
        }

        .error-content {
            max-width: 600px;
        }

        .error-code {
            font-size: 10rem;
            font-weight: 300;
            line-height: 1;
            margin-bottom: 1rem;
            color: #C9A876;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .error-title {
            font-size: 2.5rem;
            font-weight: 300;
            margin-bottom: 1rem;
            letter-spacing: 2px;
        }

        .error-message {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            color: #F5E6D3;
            line-height: 1.8;
        }

        .error-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-home {
            padding: 1rem 2.5rem;
            background: #C9A876;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-home:hover {
            background: white;
            color: #000;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(201, 168, 118, 0.3);
        }

        .btn-products {
            padding: 1rem 2.5rem;
            background: transparent;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            border: 2px solid white;
            transition: all 0.3s ease;
        }

        .btn-products:hover {
            background: white;
            color: #000;
            transform: translateY(-3px);
        }

        .error-icon {
            font-size: 5rem;
            margin-bottom: 2rem;
            color: #C9A876;
        }

        @media (max-width: 768px) {
            .error-code {
                font-size: 6rem;
            }

            .error-title {
                font-size: 1.8rem;
            }

            .error-message {
                font-size: 1rem;
            }

            .error-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-content">
            <div class="error-icon">
                <i class="fas fa-search"></i>
            </div>
            <div class="error-code">404</div>
            <h1 class="error-title">Page Non Trouvée</h1>
            <p class="error-message">
                Désolé, la page que vous recherchez n'existe pas ou a été déplacée.
                <br>
                Retournez à l'accueil pour découvrir nos produits de beauté premium.
            </p>
            <div class="error-buttons">
                <a href="index.html" class="btn-home">
                    <i class="fas fa-home"></i> Retour à l'Accueil
                </a>
                <a href="products.html" class="btn-products">
                    <i class="fas fa-shopping-bag"></i> Voir les Produits
                </a>
            </div>
        </div>
    </div>

    <script>
        // Redirection automatique après 10 secondes
        setTimeout(() => {
            window.location.href = 'index.html';
        }, 10000);
    </script>
</body>
</html>
